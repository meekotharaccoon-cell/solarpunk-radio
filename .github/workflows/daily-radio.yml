name: Daily Radio Agent

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC daily
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radio agent
        run: python -m agent.radio_agent

      - name: Archive current shows
        run: |
          DATE=$(date -u +%Y-%m-%d)
          for f in playlists/*_$(date -u +%Y%m%d)_*.m3u; do
            if [ -f "$f" ]; then
              SHOW_NAME=$(basename "$f" | sed 's/_[0-9]*_[0-9]*.m3u//' | tr '_' ' ')
              python -m agent.archive_manager add-show \
                --name "$SHOW_NAME" \
                --date "$DATE" \
                --genre "mixed" \
                --file "$f"
            fi
          done

      - name: Generate RSS feed
        run: python -m agent.archive_manager generate-feed

      - name: Commit results
        run: |
          git config user.name "SolarPunk Radio Bot"
          git config user.email "solarpunk-radio[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "radio: daily broadcast $(date -u +%Y-%m-%d)"
          git push
